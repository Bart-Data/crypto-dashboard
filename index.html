<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Dashboard — XRP · XLM · HBAR · FLR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --xrp: #346aa9;
      --xlm: #7b68ee;
      --hbar: #00bcd4;
      --flr: #e8445a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    header h1 span { color: var(--accent); }

    #last-updated {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ── Price Ticker ── */
    .ticker-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 20px 32px;
    }

    .ticker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .ticker-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
      border-radius: 10px 0 0 10px;
    }

    .ticker-card[data-coin="XRP"]::before  { background: var(--xrp); }
    .ticker-card[data-coin="XLM"]::before  { background: var(--xlm); }
    .ticker-card[data-coin="HBAR"]::before { background: var(--hbar); }
    .ticker-card[data-coin="FLR"]::before  { background: var(--flr); }

    .ticker-card:hover,
    .ticker-card.active {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .ticker-card .coin-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .ticker-card .coin-name {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .ticker-card .coin-price {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .ticker-card .coin-change {
      font-size: 0.8rem;
      font-weight: 600;
    }

    .up   { color: var(--green); }
    .down { color: var(--red); }

    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 4px;
      height: 1em;
      width: 80px;
      display: inline-block;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Main Content ── */
    .main {
      padding: 0 32px 40px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
    }

    /* ── Chart ── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .section-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    .section-title .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .badge-xrp  { background: rgba(52, 106, 169, 0.25); color: #6aadff; }
    .badge-xlm  { background: rgba(123, 104, 238, 0.25); color: #b8a9ff; }
    .badge-hbar { background: rgba(0, 188, 212, 0.25);  color: #4dd9ec; }
    .badge-flr  { background: rgba(232, 68, 90, 0.25);  color: #ff8090; }

    .chart-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .chart-tab {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .chart-tab:hover  { border-color: var(--accent); color: var(--accent); }
    .chart-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

    #chartCanvas {
      max-height: 280px;
    }

    .chart-loading {
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* ── News ── */
    .news-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      grid-column: 1 / -1;
      margin-top: 0;
    }

    .news-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .news-tab {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .news-tab:hover  { border-color: var(--accent); color: var(--accent); }
    .news-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .news-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .news-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .news-card a {
      text-decoration: none;
      color: inherit;
    }

    .news-card .news-source {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
    }

    .news-card .news-title {
      font-size: 0.88rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }

    .news-card .news-body {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card .news-meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: auto;
    }

    .news-card .news-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--border);
    }

    .news-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 40px;
      font-size: 0.85rem;
    }

    .news-error {
      grid-column: 1 / -1;
      padding: 20px;
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: 8px;
      font-size: 0.82rem;
      color: #f8a29e;
    }

    /* Spinner */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .ticker-bar { grid-template-columns: repeat(2, 1fr); }
      .main { grid-template-columns: 1fr; }
      header, .ticker-bar, .main { padding-left: 16px; padding-right: 16px; }
    }

    @media (max-width: 500px) {
      .ticker-bar { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🪙 Crypto <span>Dashboard</span></h1>
  <span id="last-updated">Laden...</span>
</header>

<!-- Price Ticker -->
<div class="ticker-bar">
  <div class="ticker-card active" data-coin="XRP" data-id="ripple" onclick="selectCoin(this)">
    <div class="coin-label">XRP</div>
    <div class="coin-name">Ripple</div>
    <div class="coin-price" id="price-XRP"><span class="skeleton"></span></div>
    <div class="coin-change" id="change-XRP"><span class="skeleton" style="width:50px"></span></div>
  </div>
  <div class="ticker-card" data-coin="XLM" data-id="stellar" onclick="selectCoin(this)">
    <div class="coin-label">XLM</div>
    <div class="coin-name">Stellar</div>
    <div class="coin-price" id="price-XLM"><span class="skeleton"></span></div>
    <div class="coin-change" id="change-XLM"><span class="skeleton" style="width:50px"></span></div>
  </div>
  <div class="ticker-card" data-coin="HBAR" data-id="hedera-hashgraph" onclick="selectCoin(this)">
    <div class="coin-label">HBAR</div>
    <div class="coin-name">Hedera</div>
    <div class="coin-price" id="price-HBAR"><span class="skeleton"></span></div>
    <div class="coin-change" id="change-HBAR"><span class="skeleton" style="width:50px"></span></div>
  </div>
  <div class="ticker-card" data-coin="FLR" data-id="flare-networks" onclick="selectCoin(this)">
    <div class="coin-label">FLR</div>
    <div class="coin-name">Flare</div>
    <div class="coin-price" id="price-FLR"><span class="skeleton"></span></div>
    <div class="coin-change" id="change-FLR"><span class="skeleton" style="width:50px"></span></div>
  </div>
</div>

<!-- Chart + Info -->
<div class="main">
  <div class="chart-section">
    <div class="section-title">
      Koers — laatste 7 dagen
      <span class="badge badge-xrp" id="chart-badge">XRP</span>
    </div>
    <div class="chart-tabs">
      <button class="chart-tab active" data-coin="XRP" data-id="ripple" onclick="loadChart(this)">XRP</button>
      <button class="chart-tab" data-coin="XLM" data-id="stellar" onclick="loadChart(this)">XLM</button>
      <button class="chart-tab" data-coin="HBAR" data-id="hedera-hashgraph" onclick="loadChart(this)">HBAR</button>
      <button class="chart-tab" data-coin="FLR" data-id="flare-networks" onclick="loadChart(this)">FLR</button>
    </div>
    <div id="chart-container">
      <div class="chart-loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Stats sidebar -->
  <div class="chart-section" id="stats-panel">
    <div class="section-title" id="stats-title">Statistieken — XRP</div>
    <div id="stats-body" style="display:flex;flex-direction:column;gap:12px;margin-top:8px;">
      <div class="skeleton" style="height:16px;width:100%"></div>
      <div class="skeleton" style="height:16px;width:80%"></div>
      <div class="skeleton" style="height:16px;width:90%"></div>
    </div>
  </div>

  <!-- News -->
  <div class="news-section">
    <div class="section-title">Laatste Nieuws</div>
    <div class="news-tabs">
      <button class="news-tab active" data-cat="XRP" onclick="switchNews(this)">XRP</button>
      <button class="news-tab" data-cat="XLM" onclick="switchNews(this)">XLM</button>
      <button class="news-tab" data-cat="HBAR" onclick="switchNews(this)">HBAR</button>
      <button class="news-tab" data-cat="FLR" onclick="switchNews(this)">Flare</button>
    </div>
    <div class="news-grid" id="news-grid">
      <div class="news-empty"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────
  const COINS = {
    XRP:  { id: 'ripple',           name: 'Ripple',  badge: 'badge-xrp',  color: '#346aa9' },
    XLM:  { id: 'stellar',          name: 'Stellar', badge: 'badge-xlm',  color: '#7b68ee' },
    HBAR: { id: 'hedera-hashgraph', name: 'Hedera',  badge: 'badge-hbar', color: '#00bcd4' },
    FLR:  { id: 'flare-networks',   name: 'Flare',   badge: 'badge-flr',  color: '#e8445a' },
  };

  const COINGECKO = 'https://api.coingecko.com/api/v3';
  const NEWS_API  = 'https://min-api.cryptocompare.com/data/v2/news/?lang=EN&sortOrder=latest&categories=';

  let chartInstance = null;
  let activeCoinKey = 'XRP';
  let newsCache = {};
  let chartCache = {};

  // ── Prices ──────────────────────────────────────────
  async function fetchPrices() {
    try {
      const ids = Object.values(COINS).map(c => c.id).join(',');
      const res  = await fetch(`${COINGECKO}/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true&include_market_cap=true&include_24hr_vol=true`);
      const data = await res.json();

      for (const [sym, cfg] of Object.entries(COINS)) {
        const d = data[cfg.id];
        if (!d) continue;
        const price  = d.usd;
        const change = d.usd_24h_change;
        document.getElementById(`price-${sym}`).textContent = formatPrice(price);
        const el = document.getElementById(`change-${sym}`);
        el.textContent = `${change >= 0 ? '▲' : '▼'} ${Math.abs(change).toFixed(2)}%`;
        el.className = `coin-change ${change >= 0 ? 'up' : 'down'}`;
      }

      document.getElementById('last-updated').textContent =
        'Bijgewerkt: ' + new Date().toLocaleTimeString('nl-NL');

      // Update stats for active coin
      renderStats(data);
    } catch (e) {
      console.error('Price fetch failed:', e);
    }
  }

  function formatPrice(p) {
    if (p >= 1) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    return '$' + p.toFixed(6);
  }

  // ── Stats ────────────────────────────────────────────
  let allPriceData = null;

  async function renderStats(data) {
    allPriceData = data;
    const cfg = COINS[activeCoinKey];
    const d   = data[cfg.id];
    if (!d) return;

    document.getElementById('stats-title').textContent = `Statistieken — ${activeCoinKey}`;
    const rows = [
      ['Prijs',         formatPrice(d.usd)],
      ['24u Verandering', `<span class="${d.usd_24h_change >= 0 ? 'up' : 'down'}">${d.usd_24h_change >= 0 ? '+' : ''}${d.usd_24h_change?.toFixed(2)}%</span>`],
      ['Market Cap',    formatLarge(d.usd_market_cap)],
      ['24u Volume',    formatLarge(d.usd_24h_vol)],
    ];

    document.getElementById('stats-body').innerHTML = rows.map(([label, val]) => `
      <div style="display:flex;justify-content:space-between;align-items:center;
                  padding:10px 14px;background:var(--bg);border-radius:8px;
                  border:1px solid var(--border);font-size:0.82rem;">
        <span style="color:var(--muted)">${label}</span>
        <span style="font-weight:600">${val}</span>
      </div>`).join('');
  }

  function formatLarge(n) {
    if (!n) return '—';
    if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  }

  // ── Chart ─────────────────────────────────────────────
  async function loadChart(btn) {
    document.querySelectorAll('.chart-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const coin = btn.dataset.coin;
    const id   = btn.dataset.id;
    activeCoinKey = coin;

    const badge = document.getElementById('chart-badge');
    badge.className = `badge ${COINS[coin].badge}`;
    badge.textContent = coin;

    if (allPriceData) renderStats(allPriceData);

    if (chartCache[coin]) {
      renderChart(chartCache[coin], coin);
      return;
    }

    const container = document.getElementById('chart-container');
    container.innerHTML = '<div class="chart-loading"><div class="spinner"></div></div>';

    try {
      const res  = await fetch(`${COINGECKO}/coins/${id}/market_chart?vs_currency=usd&days=7&interval=hourly`);
      const data = await res.json();
      chartCache[coin] = data.prices;
      renderChart(data.prices, coin);
    } catch (e) {
      container.innerHTML = `<div class="chart-loading" style="color:var(--red)">Kon koersdata niet laden. Probeer het opnieuw.</div>`;
    }
  }

  function renderChart(prices, coin) {
    const container = document.getElementById('chart-container');
    container.innerHTML = '<canvas id="chartCanvas"></canvas>';
    const ctx = document.getElementById('chartCanvas').getContext('2d');

    if (chartInstance) chartInstance.destroy();

    const labels = prices.map(p => {
      const d = new Date(p[0]);
      return d.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short' }) + ' ' +
             d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
    });
    const values = prices.map(p => p[1]);
    const color  = COINS[coin].color;
    const isUp   = values[values.length - 1] >= values[0];
    const lineColor = isUp ? '#3fb950' : '#f85149';

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: coin + ' (USD)',
          data: values,
          borderColor: lineColor,
          backgroundColor: lineColor + '18',
          borderWidth: 2,
          pointRadius: 0,
          pointHoverRadius: 4,
          fill: true,
          tension: 0.3,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { intersect: false, mode: 'index' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#21262d',
            borderColor: '#30363d',
            borderWidth: 1,
            titleColor: '#8b949e',
            bodyColor: '#e6edf3',
            callbacks: {
              label: ctx => ' ' + formatPrice(ctx.raw),
              title: ctx => ctx[0].label,
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: '#8b949e',
              maxTicksLimit: 8,
              font: { size: 11 },
              maxRotation: 0,
            },
            grid: { color: '#21262d' }
          },
          y: {
            ticks: {
              color: '#8b949e',
              font: { size: 11 },
              callback: v => formatPrice(v),
            },
            grid: { color: '#21262d' }
          }
        }
      }
    });
  }

  // ── News ─────────────────────────────────────────────
  async function loadNews(cat) {
    if (newsCache[cat]) { renderNews(newsCache[cat]); return; }

    document.getElementById('news-grid').innerHTML =
      '<div class="news-empty"><div class="spinner"></div></div>';

    try {
      const res  = await fetch(NEWS_API + cat);
      const data = await res.json();
      const articles = (data.Data || []).slice(0, 12);
      newsCache[cat] = articles;
      renderNews(articles);
    } catch (e) {
      document.getElementById('news-grid').innerHTML =
        `<div class="news-error">⚠️ Nieuws kon niet worden geladen. Controleer je internetverbinding of probeer het later opnieuw.</div>`;
    }
  }

  function renderNews(articles) {
    const grid = document.getElementById('news-grid');
    if (!articles.length) {
      grid.innerHTML = '<div class="news-empty">Geen nieuwsartikelen gevonden.</div>';
      return;
    }

    grid.innerHTML = articles.map(a => {
      const date = new Date(a.published_on * 1000).toLocaleString('nl-NL', {
        day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit'
      });
      const img = a.imageurl
        ? `<img class="news-img" src="${a.imageurl}" alt="" loading="lazy" onerror="this.style.display='none'">`
        : '';
      return `
        <a class="news-card" href="${a.url}" target="_blank" rel="noopener noreferrer">
          ${img}
          <div class="news-source">${a.source_info?.name || a.source || 'Nieuws'}</div>
          <div class="news-title">${a.title}</div>
          <div class="news-body">${a.body || ''}</div>
          <div class="news-meta">${date}</div>
        </a>`;
    }).join('');
  }

  function switchNews(btn) {
    document.querySelectorAll('.news-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadNews(btn.dataset.cat);
  }

  // ── Coin Select (ticker card) ─────────────────────────
  function selectCoin(card) {
    document.querySelectorAll('.ticker-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');

    const coin = card.dataset.coin;
    const id   = card.dataset.id;

    // Sync chart tab
    const chartBtn = document.querySelector(`.chart-tab[data-coin="${coin}"]`);
    if (chartBtn) loadChart(chartBtn);
  }

  // ── Init ─────────────────────────────────────────────
  async function init() {
    fetchPrices();
    setInterval(fetchPrices, 60_000); // refresh every 60s

    // Load initial chart
    const firstChartTab = document.querySelector('.chart-tab.active');
    loadChart(firstChartTab);

    // Load initial news
    loadNews('XRP');
  }

  init();
</script>
</body>
</html>
